<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EJEMPLO DE APP WEB MVC CON SPRING BOOT</title>
    <meta charset="UTF-8"/>
</head>
<body>

<!-- Guía 14: fragmento cabecero — Guía 15: usa #{} para leer messages.properties -->
<header th:fragment="cabecero">
    <h1 th:text="#{plantilla.titulo}">El titulo</h1>
</header>

<!-- Guía 14: fragmento pie — Guía 15: usa #{} para leer messages.properties -->
<footer th:fragment="pie">
    <span th:text="#{plantilla.pie}">El Pie</span>
    <p><a href="https://www.youtube.com/johncarrosarrietaarrieta">
        Canal de Youtube
    </a></p>
</footer>

</body>
</html>
