<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Usuarios</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
        nav { background: #333; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 16px; font-size: 14px; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 1000px; margin: 32px auto; padding: 0 20px; }
        h1 { color: #333; margin-bottom: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .btn { display: inline-block; padding: 8px 16px; background: #333; color: white; text-decoration: none; border-radius: 4px; font-size: 13px; }
        .btn-success { background: #28a745; }
        .btn-warning { background: #e68a00; }
        .btn-danger  { background: #cc2200; }
        .btn:hover   { opacity: 0.85; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        th { background: #333; color: white; padding: 12px 10px; text-align: left; font-size: 13px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        tr:hover { background: #f8f9fa; }
        .logout-btn { background: none; border: 1px solid white; color: white; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
<nav>
    <div>
        <a th:href="@{/}"> Inicio</a>
        <a th:href="@{/usuarios}"> Usuarios</a>
        <a th:href="@{/usuarios/nuevo}"> Nuevo Usuario</a>
        <a th:href="@{/mascotas}"> Mascotas</a>
        <a th:href="@{/mascotas/nueva}"> Nueva Mascota</a>
    </div>
    <div>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="logout-btn">Cerrar sesión</button>
        </form>
    </div>
</nav>
<div class="container">
    <div class="top-bar">
        <h1> Lista de Usuarios</h1>
        <a th:href="@{/usuarios/nuevo}" class="btn btn-success"> Nuevo Usuario</a>
    </div>

    <div th:if="${#lists.isEmpty(usuarios)}">
        <p>No hay usuarios registrados todavía.</p>
    </div>

    <table th:if="${!#lists.isEmpty(usuarios)}">
        <thead>
        <tr>
            <th>Cédula</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="usuario : ${usuarios}">
            <td th:text="${usuario.cedula}"></td>
            <td th:text="${usuario.nombre}"></td>
            <td th:text="${usuario.email}"></td>
            <td>
                <a th:href="@{/usuarios/ver/{cedula}(cedula=${usuario.cedula})}"
                   class="btn">Ver</a>
                <a th:href="@{/usuarios/editar/{cedula}(cedula=${usuario.cedula})}"
                   class="btn btn-warning">Editar</a>
                <a th:href="@{/usuarios/eliminar/{cedula}(cedula=${usuario.cedula})}"
                   class="btn btn-danger"
                   onclick="return confirm('¿Eliminar este usuario?')">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
