<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Mascotas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
        nav { background: #0066cc; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 16px; font-size: 14px; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }
        h1 { color: #333; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 8px 16px; background: #0066cc; color: white; text-decoration: none; border-radius: 4px; font-size: 13px; }
        .btn-success { background: #28a745; }
        .btn-warning { background: #e68a00; }
        .btn-danger { background: #cc2200; }
        .btn:hover { opacity: 0.85; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        th { background: #0066cc; color: white; padding: 12px 10px; text-align: left; font-size: 13px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        tr:hover { background: #f8f9fa; }
        .badge-si { background: #eaf8ec; color: #1a5c20; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .badge-no { background: #fdeaea; color: #c00; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .logout-btn { background: none; border: 1px solid white; color: white; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
<nav>
    <div>
        <a th:href="@{/}"> Inicio</a>
        <a th:href="@{/usuarios}"> Usuarios</a>
        <a th:href="@{/mascotas}"> Mascotas</a>
        <a th:href="@{/mascotas/agregar}"> Nueva Mascota</a>
    </div>
    <div>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="logout-btn">Cerrar sesión</button>
        </form>
    </div>
</nav>
<div class="container">
    <div class="top-bar">
        <h1> Lista de Mascotas</h1>
        <a th:href="@{/mascotas/agregar}" class="btn btn-success"> Nueva Mascota</a>
    </div>

    <div th:if="${#lists.isEmpty(mascotas)}">
        <p>No hay mascotas registradas todavía.</p>
    </div>

    <table th:if="${!#lists.isEmpty(mascotas)}">
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Especie</th>
            <th>Raza</th>
            <th>Género</th>
            <th>Peso</th>
            <th>Tamaño</th>
            <th>Hábitat</th>
            <th>Vacunas</th>
            <th>Propietario</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="mascota : ${mascotas}">
            <td th:text="${mascota.nombre}"></td>
            <td th:text="${mascota.especie}"></td>
            <td th:text="${mascota.raza}"></td>
            <td th:text="${mascota.genero}"></td>
            <td th:text="${mascota.peso} + ' kg'"></td>
            <td th:text="${mascota.tamano}"></td>
            <td th:text="${mascota.domesticoOSalvaje}"></td>
            <td>
                <span th:if="${mascota.tieneVacunas}" class="badge-si"> Sí</span>
                <span th:unless="${mascota.tieneVacunas}" class="badge-no"> No</span>
            </td>
            <td th:text="${mascota.propietario}"></td>
            <td>
                <a th:href="@{/mascotas/ver/{id}(id=${mascota.id})}" class="btn">Ver</a>
                <a th:href="@{/mascotas/editar/{id}(id=${mascota.id})}" class="btn btn-warning">Editar</a>
                <a th:href="@{/mascotas/eliminar/{id}(id=${mascota.id})}"
                   class="btn btn-danger"
                   onclick="return confirm('¿Eliminar esta mascota?')">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
