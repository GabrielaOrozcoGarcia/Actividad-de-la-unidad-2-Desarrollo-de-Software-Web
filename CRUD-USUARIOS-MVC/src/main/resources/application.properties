# Conexion a MySQL de Laragon
spring.datasource.url=jdbc:mysql://localhost:3306/crud_usuarios_mvc?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Puerto del servidor
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false